# Default dashboard layout.
#
# Parsed into `dashboard::layout::Layout` via serde and
# resolved by `Layout::resolve` into widget placements
# and divider placements the SVG builder dispatches on.
#
# Sizing: each child declares either `size = N` (fixed
# pixels on the parent split's main axis) or `flex = N`
# (share of the remaining space after fixed children
# and separators are subtracted). `size` and `flex` are
# mutually exclusive; `flex` must be at least 1.
#
# Dividers: set `divider = true` on a split to reserve
# 2 px between adjacent children and emit a line there.
#
# Weather-domain widgets take a `day` selector:
# `day = "today"` reads the current / today's summary,
# numeric `day = 0..N` reads forecast tile N.

canvas = { width = 800, height = 480 }

split = "vertical"
divider = true

# Header band: brand, title, clock, battery.
[[children]]
size = 50
split = "horizontal"
children = [
    { size = 200, widget = "brand" },
    { size = 400, widget = "header-title", text = "Weather Report" },
    { size = 50,  widget = "clock" },
    { size = 150, widget = "battery" },
]

# Current-conditions band: icon · big temp · condition /
# feels-like stacked on the right.
[[children]]
size = 132
split = "horizontal"
children = [
    { size = 150, widget = "weather-icon", day = "today" },
    { size = 250, widget = "temp-now" },
    { flex = 1, split = "vertical", children = [
        { flex = 3, widget = "condition",  day = "today" },
        { flex = 2, widget = "feels-like" },
    ] },
]

# Meteorology strip: wind, gust, humidity.
[[children]]
size = 50
split = "horizontal"
divider = true
children = [
    { flex = 1, widget = "wind" },
    { flex = 1, widget = "gust" },
    { flex = 1, widget = "humidity" },
]

# Forecast row: three day tiles, each a vertical stack
# of (day-name, weather-icon, high/low row).
[[children]]
size = 190
split = "horizontal"
children = [
    { flex = 1, split = "vertical", children = [
        { size = 40, widget = "day-name",     day = 0 },
        { flex = 1,  widget = "weather-icon", day = 0 },
        { size = 40, split = "horizontal", children = [
            { flex = 1, widget = "temp-high", day = 0, label = "H" },
            { flex = 1, widget = "temp-low",  day = 0, label = "L" },
        ] },
    ] },
    { flex = 1, split = "vertical", children = [
        { size = 40, widget = "day-name",     day = 1 },
        { flex = 1,  widget = "weather-icon", day = 1 },
        { size = 40, split = "horizontal", children = [
            { flex = 1, widget = "temp-high", day = 1, label = "H" },
            { flex = 1, widget = "temp-low",  day = 1, label = "L" },
        ] },
    ] },
    { flex = 1, split = "vertical", children = [
        { size = 40, widget = "day-name",     day = 2 },
        { flex = 1,  widget = "weather-icon", day = 2 },
        { size = 40, split = "horizontal", children = [
            { flex = 1, widget = "temp-high", day = 2, label = "H" },
            { flex = 1, widget = "temp-low",  day = 2, label = "L" },
        ] },
    ] },
]

# Footer: today hi/lo, sunrise, sunset.
[[children]]
size = 50
split = "horizontal"
children = [
    { size = 380, split = "horizontal", children = [
        { flex = 1, widget = "temp-high", day = "today", label = "Today H" },
        { flex = 1, widget = "temp-low",  day = "today", label = "L" },
    ] },
    { size = 210, widget = "sunrise" },
    { size = 210, widget = "sunset" },
]
